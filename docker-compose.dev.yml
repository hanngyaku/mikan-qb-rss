services:
  backend:
    build: .
    environment:
      DB_PATH: /app/data/app.db
      LOG_PATH: /app/data/app.log
      LISTEN_ADDR: :8081
    ports:
      - "8081:8081"
    volumes:
      - app-data:/app/data

  web:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_PORT: 5173
      VITE_API_PROXY: http://backend:8081
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  app-data:
  web-node-modules:
