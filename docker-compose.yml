services:
  backend:
    build: .
    environment:
      DB_PATH: /app/data/app.db
      LOG_PATH: /app/data/app.log
      LISTEN_ADDR: :8081
    expose:
      - "8081"
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  app-data:
